<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="facet-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="facet-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="facet-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="facet-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="outer-glow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Emerald faceted prism structure -->
  <g transform="translate(60, 60)" filter="url(#outer-glow)">
    <!-- Main diamond / prism shape -->
    <!-- Top facet (lightest) -->
    <polygon points="0,-42 28,-14 0,-8" fill="url(#facet-light)" opacity="0.95" />
    <!-- Top-left facet -->
    <polygon points="0,-42 -28,-14 0,-8" fill="url(#facet-main)" opacity="0.9" />
    <!-- Right facet -->
    <polygon points="28,-14 0,-8 24,20 0,46" fill="url(#facet-dark)" opacity="0.85" />
    <!-- Left facet -->
    <polygon points="-28,-14 0,-8 -24,20 0,46" fill="url(#facet-main)" opacity="0.75" />
    <!-- Bottom-right facet -->
    <polygon points="0,-8 24,20 0,46" fill="url(#facet-dark)" opacity="0.7" />
    <!-- Bottom-left facet -->
    <polygon points="0,-8 -24,20 0,46" fill="#047857" opacity="0.65" />
    <!-- Center highlight line -->
    <line x1="0" y1="-42" x2="0" y2="46" stroke="#6ee7b7" stroke-width="0.5" opacity="0.4" />
    <!-- Cross line -->
    <line x1="-28" y1="-14" x2="28" y2="-14" stroke="#6ee7b7" stroke-width="0.3" opacity="0.3" />
    <!-- Inner refraction lines -->
    <line x1="0" y1="-8" x2="24" y2="20" stroke="#a7f3d0" stroke-width="0.3" opacity="0.25" />
    <line x1="0" y1="-8" x2="-24" y2="20" stroke="#a7f3d0" stroke-width="0.3" opacity="0.25" />

    <!-- Small accent gem (violet) -->
    <g transform="translate(36, -28)">
      <polygon points="0,-8 6,-2 0,8 -6,-2" fill="url(#facet-accent)" opacity="0.7" />
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#c4b5fd" stroke-width="0.3" opacity="0.4" />
    </g>

    <!-- Sparkle dots -->
    <circle cx="-10" cy="-30" r="1" fill="#fff" opacity="0.7" />
    <circle cx="18" cy="-22" r="0.7" fill="#fff" opacity="0.5" />
    <circle cx="-20" cy="10" r="0.5" fill="#a7f3d0" opacity="0.4" />
  </g>

  <!-- Text: LUMINA -->
  <g transform="translate(120, 50)">
    <text
      font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
      font-size="36"
      font-weight="700"
      letter-spacing="8"
      fill="#e4e4e7"
    >LUMINA</text>
  </g>

  <!-- Text: SCAN -->
  <g transform="translate(120, 82)">
    <text
      font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
      font-size="14"
      font-weight="500"
      letter-spacing="12"
      fill="#52525b"
    >SCAN</text>
  </g>

  <!-- Thin separator line between LUMINA and SCAN -->
  <line x1="120" y1="58" x2="200" y2="58" stroke="#27272a" stroke-width="1" />
</svg>
